


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus — Sign In</title>
  <link rel="stylesheet" href="static/css/main.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div style="font-size:36px;font-weight:900;margin-bottom:32px">𝕏 Nexus</div>

      <div id="loginView">
        <div class="auth-title">Sign in to Nexus</div>
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
        <div class="form-error" id="loginError"></div>
        <div class="divider">or</div>
        <button class="btn btn-outline" style="width:100%"
                onclick="showView('register')">Create account</button>
      </div>

      <div id="registerView" style="display:none">
        <div class="auth-title">Join Nexus today</div>
        <div class="form-group">
          <label>Username</label>
          <input id="regUsername" type="text" placeholder="gabriel_dev"/>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input id="regDisplay" type="text" placeholder="Gabriel"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="you@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="regPassword" type="password" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') doRegister()"/>
        </div>
        <button class="btn btn-blue" style="width:100%" onclick="doRegister()">
          Create Account
        </button>
        <div class="form-error" id="registerError"></div>
        <div class="divider">or</div>
        <button class="btn btn-outline" style="width:100%"
                onclick="showView('login')">Sign in instead</button>
      </div>
    </div>
  </div>

  <script src="static/js/api.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = "index.html";
    initTheme();

    function showView(v) {
      document.getElementById("loginView").style.display    = v === "login"    ? "block" : "none";
      document.getElementById("registerView").style.display = v === "register" ? "block" : "none";
    }

    async function doLogin() {
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const err      = document.getElementById("loginError");
      err.textContent = "";
      if (!email || !password) { err.textContent = "Fill in all fields."; return; }

      const [status, data] = await apiLogin(email, password);
      if (status === 200) {
        setToken(data.access_token);
        setUser(data.user);
        window.location.href = "index.html";
      } else {
        err.textContent = data.detail || "Login failed.";
      }
    }

    async function doRegister() {
      const username     = document.getElementById("regUsername").value.trim();
      const display_name = document.getElementById("regDisplay").value.trim();
      const email        = document.getElementById("regEmail").value.trim();
      const password     = document.getElementById("regPassword").value;
      const err          = document.getElementById("registerError");
      err.textContent = "";
      if (!username || !email || !password) { err.textContent = "Fill in all fields."; return; }

      const [status, data] = await apiRegister({ username, display_name, email, password });
      if (status === 201) {
        showToast("Account created! Sign in.");
        setTimeout(() => showView("login"), 1000);
      } else {
        err.textContent = data.detail || "Registration failed.";
      }
    }
  </script>
</body>
</html>
